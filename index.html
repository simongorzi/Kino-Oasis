<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kino Oasis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div style="height: 49px;"></div> 

<!-- navigace -->
<nav class="navbar navbar-expand-lg fixed-top" id="navbar">
    <div class="container">
        <a class="navbar-brand" a href="index.html">
            <img src="obr/logo1.png" alt="Kino Oasis" height="50">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-film"></i> Filmy</a></li>
                <li class="nav-item"><a class="nav-link" href="platno.html"><i class="fas fa-ticket-alt"></i> Rezervace</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#blogModal"><i class="fas fa-blog"></i> Blog</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-info-circle"></i> O kině</a></li>
                <li class="nav-item"><a class="nav-link" href="#Kontakt"><i class="fas fa-envelope"></i> Kontakt</a></li>
            </ul>
            <div class="navbar-divider"></div>  <!-- oddělovací čára -->
        </div>
    </div>
</nav>

 <!-- Modální okno pro Blog -->
 <div class="modal fade" id="blogModal" tabindex="-1" aria-labelledby="blogModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="blogModalLabel">Blog Kino Oasis</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Zavřít"></button>
            </div>
            <div class="modal-body">
                <h3></h3>
                <p> </p>
                <h3></h3>
                <p></p>
                <h3></h3>
                <p></p>
            </div>
        </div>
    </div>
</div>


<!-- dropdown na filtraci filmu -->
<div class="filter-container">
    <label for="genreFilter" class="filter-label">🎬 Vyberte žánr:</label>
    <select id="genreFilter" class="custom-dropdown">
        <option value="všechny">Všechny žánry</option>
        <option value="horor">👻 Horor</option>
        <option value="komedie">😂 Komedie</option>
        <option value="fantasy">🔮 Fantasy / Sci-fi</option>
    </select>
</div>


<!-- Tlačítko na skrytí/zobrazení navigace -->
<button class="toggle-nav" id="toggleNavBtn">
    <i class="fas fa-chevron-up"></i>
</button>

 <!-- Seznam filmů (bude generován JavaScriptem) -->
<div class="container my-5">
    <div class="row">
        <div class="col-md-8">
            <div id="film-list"></div>
        </div>
    </div>
</div>

    <!-- kontaktní údaje -->
    <div class="container my-5" id="Kontakt">
        <hr class="contact-divider"> <!-- Oddělovací čára -->
        <h2 class="text-center">Kontakt</h2>
        <div class="row">
            <div class="col-md-4">
                <div class="contact-card text-center p-3">
                    <i class="fas fa-envelope fa-2x text-danger"></i>
                    <h4>Email</h4>
                    <p>info@kinooasis.cz</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="contact-card text-center p-3">
                    <i class="fas fa-phone fa-2x text-danger"></i>
                    <h4>Telefon</h4>
                    <p>+420 123 456 789</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="contact-card text-center p-3">
                    <i class="fas fa-map-marker-alt fa-2x text-danger"></i>
                    <h4>Adresa</h4>
                    <p>Ulice 123, Praha, ČR</p>
                </div>
            </div>
        </div>
    
        <!-- Kontaktní formulář -->
        <div class="contact-form mt-5">
            <h3 class="text-center">Napište nám</h3>
            <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label">Jméno</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">Zpráva</label>
                    <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-danger w-100">Odeslat</button>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="java.js"></script>
</body>
</html>
